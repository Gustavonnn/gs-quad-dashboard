<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .badge {
    display: inline-flex; align-items: center;
    border-radius: 2px; border: 1px solid transparent;
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .sep { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #555; letter-spacing: 0.2em; text-transform: uppercase; width: 100%; margin-top: 4px; }
</style>
</head>
<body>
  <div class="sep">Status Badges</div>
  <div class="row">
    <span class="badge" style="background:#00ff66;color:#030303">DEFAULT</span>
    <span class="badge" style="background:rgba(0,255,102,0.15);color:#00ff66">SUCCESS</span>
    <span class="badge" style="background:rgba(255,215,0,0.15);color:#ffd700">WARNING</span>
    <span class="badge" style="background:rgba(255,51,51,0.15);color:#ff3333">DANGER</span>
    <span class="badge" style="background:rgba(0,212,255,0.15);color:#00d4ff">INTEL</span>
    <span class="badge" style="background:rgba(0,122,255,0.15);color:#007aff">ACTIVE</span>
  </div>
  <div class="sep">Outline / Secondary</div>
  <div class="row">
    <span class="badge" style="border-color:#1f1f1f;color:#ededed">OUTLINE</span>
    <span class="badge" style="background:#1f1f1f;color:#ededed">SECONDARY</span>
    <span class="badge" style="background:#ff3333;color:#fff">CRÍTICO</span>
    <span class="badge" style="background:#ffd700;color:#030303">ALTO</span>
    <span class="badge" style="background:#1f1f1f;color:#888">SISTEMA</span>
  </div>
  <div class="sep">Live Indicator</div>
  <div class="row">
    <div style="display:flex;align-items:center;gap:6px">
      <div style="position:relative;width:8px;height:8px">
        <span style="position:absolute;inset:0;border-radius:50%;background:#00ff66;animation:ping 1.5s ease-out infinite;opacity:0.5"></span>
        <span style="position:relative;display:block;width:8px;height:8px;border-radius:50%;background:#00ff66"></span>
      </div>
      <span class="badge" style="background:transparent;border-color:transparent;color:#00ff66;padding:0;letter-spacing:0.25em">OPERAÇÃO ATIVA</span>
    </div>
    <span class="badge" style="background:rgba(0,255,102,0.08);color:#00ff66;border-color:rgba(0,255,102,0.2)">SYSTEM ONLINE</span>
    <span class="badge" style="background:rgba(255,215,0,0.08);color:#ffd700;border-color:rgba(255,215,0,0.2)">LIVE FEED</span>
  </div>
  <style>
    @keyframes ping { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(2.2);opacity:0} }
  </style>
</body>
</html>
