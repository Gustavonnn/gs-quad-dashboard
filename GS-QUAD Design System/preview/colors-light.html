<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0f0; padding: 16px; font-family: 'JetBrains Mono', monospace; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .swatch { height: 52px; border-radius: 2px; }
  .label { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: #666; margin-top: 5px; }
  .val   { font-size: 8px; color: #999; margin-top: 2px; }
  .row { display: flex; flex-direction: column; }
  .section { font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: #999; margin-bottom: 10px; margin-top: 14px; }
</style>
</head>
<body>
<div class="section">Light / ML-Inspired</div>
<div class="grid">
  <div class="row"><div class="swatch" style="background:#f5f5f5;border:1px solid #e6e6e6"></div><div class="label">BG</div><div class="val">#f5f5f5</div></div>
  <div class="row"><div class="swatch" style="background:#ffffff;border:1px solid #e6e6e6"></div><div class="label">SURFACE</div><div class="val">#ffffff</div></div>
  <div class="row"><div class="swatch" style="background:#fff159;border:1px solid #e6e6e6"></div><div class="label">HEADER</div><div class="val">#fff159</div></div>
  <div class="row"><div class="swatch" style="background:#e6e6e6"></div><div class="label">BORDER</div><div class="val">#e6e6e6</div></div>
  <div class="row"><div class="swatch" style="background:#999999"></div><div class="label">MUTED</div><div class="val">#999999</div></div>
  <div class="row"><div class="swatch" style="background:#666666"></div><div class="label">SUBTLE</div><div class="val">#666666</div></div>
  <div class="row"><div class="swatch" style="background:#333333"></div><div class="label">TEXT</div><div class="val">#333333</div></div>
  <div class="row"><div class="swatch" style="background:#3483fa"></div><div class="label">ML BLUE</div><div class="val">#3483fa</div></div>
</div>

<div class="section">Light Accents</div>
<div class="grid">
  <div class="row"><div class="swatch" style="background:#3483fa"></div><div class="label">PRIMARY</div><div class="val">#3483fa</div></div>
  <div class="row"><div class="swatch" style="background:rgba(52,131,250,0.12);border:1px solid #e6e6e6"></div><div class="label">PRI DIM</div><div class="val">rgba 12%</div></div>
  <div class="row"><div class="swatch" style="background:#00adef"></div><div class="label">CYAN</div><div class="val">#00adef</div></div>
  <div class="row"><div class="swatch" style="background:#fff159;border:1px solid #e6e6e6"></div><div class="label">YELLOW</div><div class="val">#fff159</div></div>
  <div class="row"><div class="swatch" style="background:#ff7733"></div><div class="label">ORANGE</div><div class="val">#ff7733</div></div>
  <div class="row"><div class="swatch" style="background:#555555"></div><div class="label">NEUTRAL</div><div class="val">#555555</div></div>
  <div class="row"><div class="swatch" style="background:#e6e6e6;border:1px solid #ccc"></div><div class="label">GRID</div><div class="val">#e6e6e6</div></div>
  <div class="row"><div class="swatch" style="background:#999999"></div><div class="label">LABEL</div><div class="val">#999999</div></div>
</div>
</body>
</html>
