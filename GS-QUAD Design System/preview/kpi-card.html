<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050505; padding: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
  .kpi {
    position: relative;
    display: flex; flex-direction: column; gap: 10px;
    padding: 16px; overflow: hidden;
    background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 2px;
    box-shadow: 1px 1px 0 #1f1f1f;
  }
  .kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 1px; opacity: 0.7; }
  .kpi-header { display: flex; align-items: center; justify-content: space-between; }
  .kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #888; }
  .kpi-value { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 26px; color: #ededed; line-height: 1; }
  .kpi-bar-bg { height: 2px; background: #1f1f1f; border-radius: 1px; }
  .kpi-bar-fill { height: 100%; border-radius: 1px; transition: width 1s ease; }
  .kpi-footer { display: flex; align-items: center; gap: 4px; }
  .kpi-trend { font-family: 'JetBrains Mono', monospace; font-size: 9px; }
</style>
</head>
<body>
  <div class="kpi">
    <div class="kpi-accent" style="background:#00ff66"></div>
    <div class="kpi-header">
      <span class="kpi-label">Receita do Dia</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00ff66" stroke-width="2" opacity="0.7"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    </div>
    <div class="kpi-value">R$ 84.930</div>
    <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:82%;background:#00ff66"></div></div>
    <div class="kpi-footer"><span class="kpi-trend" style="color:#00ff66">↑ tendência de alta</span></div>
  </div>

  <div class="kpi">
    <div class="kpi-accent" style="background:#ffd700"></div>
    <div class="kpi-header">
      <span class="kpi-label">Alertas Ativos</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.7"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="kpi-value">07</div>
    <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:35%;background:#ffd700"></div></div>
    <div class="kpi-footer"><span class="kpi-trend" style="color:#888">3 críticos / altos</span></div>
  </div>

  <div class="kpi">
    <div class="kpi-accent" style="background:#007aff"></div>
    <div class="kpi-header">
      <span class="kpi-label">Portfólio Ads</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2" opacity="0.7"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
    </div>
    <div class="kpi-value">72</div>
    <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:72%;background:#007aff"></div></div>
    <div class="kpi-footer"><span class="kpi-trend" style="color:#888">4W · 8M · 2K</span></div>
  </div>

  <div class="kpi">
    <div class="kpi-accent" style="background:#ff3333"></div>
    <div class="kpi-header">
      <span class="kpi-label">Sem Estoque</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff3333" stroke-width="2" opacity="0.7"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    </div>
    <div class="kpi-value">03</div>
    <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:30%;background:#ff3333"></div></div>
    <div class="kpi-footer"><span class="kpi-trend" style="color:#ff3333">SKUs sem estoque</span></div>
  </div>
</body>
</html>
