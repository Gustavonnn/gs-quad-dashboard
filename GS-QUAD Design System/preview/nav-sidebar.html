<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030303; display: flex; }
  .sidebar {
    width: 220px; height: 100vh; background: #0a0a0a;
    border-right: 1px solid #1f1f1f; display: flex; flex-direction: column;
  }
  .logo-zone {
    height: 60px; display: flex; align-items: center; gap: 10px;
    padding: 0 6px; border-bottom: 1px solid #1f1f1f; background: #050505;
  }
  .logo-mark {
    width: 40px; height: 40px; background: #007aff; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 11px;
    color: white; letter-spacing: -0.05em;
  }
  .brand-name { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 13px; color: #ededed; letter-spacing: 0.02em; line-height: 1; }
  .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #555; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 3px; }
  .nav { flex: 1; padding: 10px 6px; display: flex; flex-direction: column; gap: 2px; }
  .group-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #555; letter-spacing: 0.25em; text-transform: uppercase; padding: 0 8px; margin: 8px 0 4px; opacity: 0.5; }
  .nav-item {
    display: flex; align-items: center; height: 36px; border-radius: 3px;
    padding: 0 8px; cursor: pointer; gap: 0; transition: all 0.15s; position: relative;
    text-decoration: none;
  }
  .nav-item.active { background: #007aff; }
  .nav-item:not(.active):hover { background: rgba(255,255,255,0.05); }
  .nav-icon { width: 28px; height: 100%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .nav-texts { display: flex; flex-direction: column; overflow: hidden; }
  .nav-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #888; white-space: nowrap; }
  .nav-item.active .nav-label { color: white; }
  .nav-sublabel { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #555; margin-top: 2px; }
  .nav-item.active .nav-sublabel { color: rgba(255,255,255,0.55); }
  .active-bar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 2px; height: 16px; background: #00ff66; border-radius: 0 1px 1px 0; box-shadow: 0 0 6px #00ff66; }
  .divider { height: 1px; background: #1f1f1f; margin: 4px 0; opacity: 0.5; }
  .footer {
    height: 52px; border-top: 1px solid #1f1f1f;
    display: flex; align-items: center; gap: 10px; padding: 0 14px;
  }
  .pulse-wrap { position: relative; width: 8px; height: 8px; }
  .pulse-ring { position: absolute; inset: 0; border-radius: 50%; background: #00ff66; animation: ping 1.5s ease-out infinite; opacity: 0.5; }
  .pulse-dot { position: relative; width: 8px; height: 8px; border-radius: 50%; background: #00ff66; }
  @keyframes ping { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(2.2);opacity:0} }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo-zone">
    <div class="logo-mark">GS</div>
    <div>
      <div class="brand-name">GS-QUAD</div>
      <div class="brand-sub">INTEL OPS v2.1</div>
    </div>
  </div>

  <nav class="nav">
    <div class="group-label">Intel</div>
    <div class="nav-item active">
      <div class="active-bar"></div>
      <div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
      <div class="nav-texts"><span class="nav-label">WAR_ROOM</span><span class="nav-sublabel">Visão geral</span></div>
    </div>
    <div class="nav-item">
      <div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <div class="nav-texts"><span class="nav-label">TERMINAL_DB</span><span class="nav-sublabel">Catálogo SKU</span></div>
    </div>
    <div class="nav-item">
      <div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div class="nav-texts"><span class="nav-label">MONITOR</span><span class="nav-sublabel">Alertas táticos</span></div>
    </div>

    <div class="divider"></div>
    <div class="group-label">Ferramentas</div>
    <div class="nav-item">
      <div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></div>
      <div class="nav-texts"><span class="nav-label">DATA_EXPLORER</span><span class="nav-sublabel">Query Supabase</span></div>
    </div>
    <div class="nav-item">
      <div class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <div class="nav-texts"><span class="nav-label">AD_FACTORY</span><span class="nav-sublabel">Kanban ads</span></div>
    </div>
  </nav>

  <div class="footer">
    <div class="pulse-wrap"><div class="pulse-ring"></div><div class="pulse-dot"></div></div>
    <div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#00ff66">SYSTEM ONLINE</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#555;letter-spacing:0.1em;margin-top:2px">LATENCY 42ms · WS</div>
    </div>
  </div>
</div>
</body>
</html>
