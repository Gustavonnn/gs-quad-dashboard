<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS-QUAD · INTEL OPS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gs-deep: #050505; --gs-bg: #030303; --gs-surface: #0a0a0a;
  --gs-panel: #0a0a0a; --gs-header: #050505; --gs-border: #1f1f1f;
  --gs-text: #ededed; --gs-muted: #888; --gs-subtle: #555;
  --gs-green: #00ff66; --gs-green-dim: rgba(0,224,128,0.15);
  --gs-blue: #007aff; --gs-blue-dim: rgba(0,122,255,0.15);
  --gs-cyan: #00d4ff; --gs-yellow: #ffd700; --gs-yellow-dim: rgba(255,215,0,0.15);
  --gs-red: #ff3333; --gs-red-dim: rgba(255,51,51,0.15);
  --gs-orange: #ff6b00;
  --font-display: 'Space Grotesk', sans-serif;
  --font-heading: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
[data-theme='light'] {
  --gs-deep: #f5f5f5; --gs-bg: #f5f5f5; --gs-surface: #fff;
  --gs-panel: #fff; --gs-header: #fff159; --gs-border: #e6e6e6;
  --gs-text: #333; --gs-muted: #666; --gs-subtle: #999;
  --gs-green: #3483fa; --gs-green-dim: rgba(52,131,250,0.12);
  --gs-blue: #3483fa; --gs-blue-dim: rgba(52,131,250,0.12);
  --gs-cyan: #00adef; --gs-yellow: #e6c800; --gs-yellow-dim: rgba(230,200,0,0.15);
  --gs-red: #e53e3e; --gs-red-dim: rgba(229,62,62,0.12);
  --gs-orange: #ff7733;
}

html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: var(--font-display); background: var(--gs-deep); color: var(--gs-text); -webkit-font-smoothing: antialiased; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gs-border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--gs-muted); }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes ping { 0%{transform:scale(1);opacity:.5} 100%{transform:scale(2.2);opacity:0} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes scan { 0%{top:0%;opacity:0} 5%{opacity:.7} 95%{opacity:.4} 100%{top:100%;opacity:0} }
@keyframes glowPulse { 0%,100%{box-shadow:0 0 6px rgba(0,255,102,.25)} 50%{box-shadow:0 0 14px rgba(0,255,102,.55)} }

.fade-in { animation: fadeIn .35s ease-out forwards; }
.slide-up { animation: slideUp .4s cubic-bezier(.16,1,.3,1) forwards; }
.blink { animation: blink 1s step-end infinite; }
.glow-pulse { animation: glowPulse 2.5s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Icons (inline SVG) ─────────────────────── */
const Icon = ({ d, size=15, color='currentColor', strokeWidth=2, fill='none' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>
  </svg>
);
const icons = {
  dashboard: "M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z",
  chart: "M18 20V10M12 20V4M6 20v-6",
  activity: "M22 12h-4l-3 9L9 3l-3 9H2",
  trending: "M23 6L13.5 15.5 8.5 10.5 1 18 M17 6h6v6",
  brain: "M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-5 0V4.5A2.5 2.5 0 019.5 2z",
  history: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z",
  database: "M12 2C6.48 2 2 4.24 2 7v10c0 2.76 4.48 5 10 5s10-2.24 10-5V7c0-2.76-4.48-5-10-5z",
  zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
  refresh: "M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
  target: "M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z M12 18a6 6 0 100-12 6 6 0 000 12z M12 14a2 2 0 100-4 2 2 0 000 4z",
  search: "M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z",
  settings: "M12 15a3 3 0 100-6 3 3 0 000 6z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z",
  radar: "M12 2a10 10 0 100 20A10 10 0 0012 2z M12 6a6 6 0 100 12A6 6 0 0012 6z M12 10a2 2 0 100 4 2 2 0 000-4z M2 12h2M20 12h2M12 2v2M12 20v2",
  menu: "M3 12h18M3 6h18M3 18h18",
  x: "M18 6L6 18M6 6l12 12",
  sun: "M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 17a5 5 0 100-10 5 5 0 000 10z",
  moon: "M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z",
  alert: "M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z M12 9v4M12 17h.01",
  package: "M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12",
};
const Ico = ({ name, size=15, color='currentColor', sw=2 }) => {
  const d = icons[name];
  if (!d) return null;
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
};

/* ── Color tokens ───────────────────────────── */
const C = {
  green: 'var(--gs-green)', greenDim: 'var(--gs-green-dim)',
  blue: 'var(--gs-blue)', blueDim: 'var(--gs-blue-dim)',
  cyan: 'var(--gs-cyan)', yellow: 'var(--gs-yellow)', yellowDim: 'var(--gs-yellow-dim)',
  red: 'var(--gs-red)', redDim: 'var(--gs-red-dim)', orange: 'var(--gs-orange)',
  text: 'var(--gs-text)', muted: 'var(--gs-muted)', subtle: 'var(--gs-subtle)',
  panel: 'var(--gs-panel)', border: 'var(--gs-border)', bg: 'var(--gs-bg)',
};

/* ── PulseDot ───────────────────────────────── */
function PulseDot({ color = C.green, size=8 }) {
  return (
    <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
      <span style={{ position:'absolute', inset:0, borderRadius:'50%', background:color, animation:'ping 1.5s ease-out infinite', opacity:.5 }}/>
      <span style={{ position:'relative', display:'block', width:size, height:size, borderRadius:'50%', background:color }}/>
    </div>
  );
}

/* ── Badge ──────────────────────────────────── */
function Badge({ children, color=C.green, bg, border }) {
  return (
    <span style={{
      display:'inline-flex', alignItems:'center',
      fontFamily:'var(--font-mono)', fontSize:9, fontWeight:700, letterSpacing:'0.14em',
      textTransform:'uppercase', padding:'2px 7px', borderRadius:2,
      background: bg || `rgba(0,0,0,0)`, color, border:`1px solid ${border||color+'44'}`,
    }}>{children}</span>
  );
}

/* ── Sidebar ────────────────────────────────── */
const NAV_GROUPS = [
  { label: 'Intel', items: [
    { id:'war_room', label:'WAR_ROOM', sub:'Visão geral', icon:'dashboard' },
    { id:'terminal', label:'TERMINAL_DB', sub:'Catálogo SKU', icon:'chart' },
    { id:'monitor', label:'MONITOR', sub:'Alertas táticos', icon:'activity' },
    { id:'growth', label:'GROWTH_PLAN', sub:'Playbook', icon:'trending' },
    { id:'neural', label:'NEURAL_INTEL', sub:'ML · Previsões', icon:'brain' },
    { id:'price', label:'PRICE_REACT', sub:'Timeline preços', icon:'history' },
    { id:'ads_radar', label:'ADS_RADAR', sub:'Performance ads', icon:'radar' },
  ]},
  { label: 'Ferramentas', items: [
    { id:'explorer', label:'DATA_EXPLORER', sub:'Query Supabase', icon:'database' },
    { id:'activity', label:'ACTIVITY', sub:'Event timeline', icon:'zap' },
    { id:'sync', label:'SYNC_CTRL', sub:'DuckDB pipeline', icon:'refresh' },
    { id:'ad_factory', label:'AD_FACTORY', sub:'Kanban ads', icon:'target' },
    { id:'search', label:'GLOBAL_SRCH', sub:'Busca integrada', icon:'search' },
  ]},
  { label: 'Sistema', items: [
    { id:'settings', label:'SETTINGS', sub:'Preferências', icon:'settings' },
  ]},
];

function Sidebar({ active, onNav }) {
  const [hovered, setHovered] = useState(false);
  const timer = useRef(null);
  const expanded = hovered;

  return (
    <aside
      onMouseEnter={() => { clearTimeout(timer.current); setHovered(true); }}
      onMouseLeave={() => { timer.current = setTimeout(() => setHovered(false), 120); }}
      style={{
        width: expanded ? 220 : 52, transition:'width 300ms cubic-bezier(.16,1,.3,1)',
        background:'var(--gs-panel)', borderRight:'1px solid var(--gs-border)',
        display:'flex', flexDirection:'column', height:'100vh', flexShrink:0, zIndex:20, position:'relative',
      }}
    >
      {expanded && <div style={{ position:'absolute', top:0, left:0, right:0, height:1, background:'linear-gradient(90deg,transparent,rgba(0,255,102,.3),transparent)', pointerEvents:'none' }}/>}

      {/* Logo */}
      <div style={{ height:60, display:'flex', alignItems:'center', padding:'0 6px', borderBottom:'1px solid var(--gs-border)', background:'var(--gs-header)', flexShrink:0, overflow:'hidden' }}>
        <div style={{ width:40, height:40, background:C.blue, borderRadius:2, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--font-heading)', fontWeight:900, fontSize:11, color:'white', letterSpacing:'-0.05em', flexShrink:0 }}>GS</div>
        <div style={{ opacity:expanded?1:0, width:expanded?150:0, paddingLeft:expanded?10:0, transition:'opacity 160ms ease, width 280ms cubic-bezier(.16,1,.3,1)', transitionDelay:expanded?'80ms':'0ms', overflow:'hidden', whiteSpace:'nowrap' }}>
          <div style={{ fontFamily:'var(--font-heading)', fontWeight:900, fontSize:13, color:'var(--gs-text)', lineHeight:1 }}>GS-QUAD</div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8, color:C.muted, letterSpacing:'0.22em', textTransform:'uppercase', marginTop:3 }}>INTEL OPS v2.1</div>
        </div>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, overflowY:'auto', overflowX:'hidden', padding:'10px 6px', display:'flex', flexDirection:'column', gap:12 }}>
        {NAV_GROUPS.map((group, gi) => (
          <div key={group.label}>
            {gi > 0 && <div style={{ height:1, background:'var(--gs-border)', opacity:.5, margin:'2px 0' }}/>}
            <div style={{ overflow:'hidden', opacity:expanded?1:0, maxHeight:expanded?20:0, marginBottom:expanded?4:6, transition:'all 250ms cubic-bezier(.16,1,.3,1)', transitionDelay:expanded?'40ms':'0ms' }}>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:8, color:C.muted, letterSpacing:'0.25em', textTransform:'uppercase', padding:'0 8px', opacity:.5 }}>{group.label}</span>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
              {group.items.map(item => {
                const isActive = item.id === active;
                return (
                  <div key={item.id} onClick={() => onNav(item.id)}
                    style={{ position:'relative', display:'flex', alignItems:'center', height:36, borderRadius:3, cursor:'pointer', transition:'all .15s', overflow:'hidden', background:isActive?C.blue:'transparent', userSelect:'none' }}
                    onMouseEnter={e => { if(!isActive) e.currentTarget.style.background='rgba(255,255,255,0.05)'; }}
                    onMouseLeave={e => { if(!isActive) e.currentTarget.style.background='transparent'; }}
                  >
                    {isActive && <div style={{ position:'absolute', left:0, top:'50%', transform:'translateY(-50%)', width:2, height:16, background:C.green, borderRadius:'0 1px 1px 0', boxShadow:`0 0 8px ${C.green}` }}/>}
                    <div style={{ width:40, height:'100%', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <Ico name={item.icon} size={15} color={isActive?'white':C.muted} sw={2}/>
                    </div>
                    <div style={{ opacity:expanded?1:0, width:expanded?160:0, transition:'opacity 180ms ease, width 280ms cubic-bezier(.16,1,.3,1)', transitionDelay:expanded?'60ms':'0ms', overflow:'hidden' }}>
                      <div style={{ fontFamily:'var(--font-mono)', fontSize:10, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase', color:isActive?'white':C.muted, whiteSpace:'nowrap' }}>{item.label}</div>
                      <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:isActive?'rgba(255,255,255,.55)':C.subtle, marginTop:1, whiteSpace:'nowrap' }}>{item.sub}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </nav>

      {/* Status footer */}
      <div style={{ height:52, borderTop:'1px solid var(--gs-border)', display:'flex', alignItems:'center', padding:'0 6px', gap:8, flexShrink:0 }}>
        <div style={{ width:40, display:'flex', justifyContent:'center', flexShrink:0 }}>
          <PulseDot color={C.green}/>
        </div>
        <div style={{ opacity:expanded?1:0, width:expanded?160:0, transition:'opacity 160ms ease, width 280ms cubic-bezier(.16,1,.3,1)', transitionDelay:expanded?'80ms':'0ms', overflow:'hidden', whiteSpace:'nowrap' }}>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:9, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:C.green }}>SYSTEM ONLINE</div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:8, color:C.muted, letterSpacing:'0.1em', marginTop:2 }}>LATENCY 42ms · WS</div>
        </div>
      </div>
    </aside>
  );
}

/* ── Topbar ─────────────────────────────────── */
const ROUTE_META = {
  war_room: { title:'WAR_ROOM', subtitle:'MÉTRICAS LIVE · INTEL OPS' },
  terminal: { title:'TERMINAL_DB', subtitle:'CATÁLOGO SKU COMPLETO' },
  monitor: { title:'MONITOR', subtitle:'ALERTAS TÁTICOS · OPERACIONAL' },
  growth: { title:'GROWTH_PLAN', subtitle:'PLAYBOOK · ESTRATÉGIAS VALIDADAS' },
  neural: { title:'NEURAL_INTEL', subtitle:'ML PREDICTIONS · CLUSTERS' },
  price: { title:'PRICE_REACT', subtitle:'TIMELINE DE PREÇOS' },
  ads_radar: { title:'ADS_RADAR', subtitle:'PERFORMANCE ADS · MERCADO LIVRE' },
  explorer: { title:'DATA_EXPLORER', subtitle:'QUERY SUPABASE · VISUAL' },
  activity: { title:'ACTIVITY', subtitle:'EVENT TIMELINE · LOG' },
  sync: { title:'SYNC_CTRL', subtitle:'DADOS EXCEL ↔ SUPABASE ↔ DASHBOARD' },
  ad_factory: { title:'AD_FACTORY', subtitle:'KANBAN · CRIAÇÃO DE ANÚNCIOS' },
  search: { title:'GLOBAL_SRCH', subtitle:'BUSCA INTEGRADA' },
  settings: { title:'SETTINGS', subtitle:'PREFERÊNCIAS · SISTEMA' },
};

function Topbar({ active, theme, onTheme }) {
  const meta = ROUTE_META[active] || { title:'GS-QUAD' };
  return (
    <header style={{ height:60, borderBottom:'1px solid var(--gs-border)', background:'var(--gs-header)', backdropFilter:'blur(20px)', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0, zIndex:30, position:'sticky', top:0 }}>
      <div>
        <h1 style={{ fontFamily:'var(--font-heading)', fontWeight:900, fontSize:15, color:'var(--gs-text)', letterSpacing:'0.04em', lineHeight:1 }}>
          {meta.title}<span style={{ color:C.green, marginLeft:2 }}>.</span>
        </h1>
        {meta.subtitle && <p style={{ fontFamily:'var(--font-mono)', fontSize:9, color:C.muted, letterSpacing:'0.18em', textTransform:'uppercase', marginTop:3, opacity:.7 }}>{meta.subtitle}</p>}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
        <button style={{ height:34, padding:'0 12px', borderRadius:3, border:'1px solid var(--gs-border)', background:'transparent', color:C.muted, fontFamily:'var(--font-mono)', fontSize:11, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}
          onMouseEnter={e=>{ e.currentTarget.style.borderColor=C.muted; e.currentTarget.style.color='var(--gs-text)'; }}
          onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--gs-border)'; e.currentTarget.style.color=C.muted; }}
        >
          <Ico name="search" size={12} color="currentColor"/> <span>Buscar</span>
          <kbd style={{ marginLeft:6, fontSize:9, border:'1px solid var(--gs-border)', borderRadius:2, padding:'1px 5px', color:C.muted }}>⌘K</kbd>
        </button>
        <button onClick={onTheme} style={{ width:34, height:34, borderRadius:3, border:'1px solid var(--gs-border)', background:'transparent', color:C.muted, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}
          onMouseEnter={e=>{ e.currentTarget.style.borderColor=C.muted; e.currentTarget.style.color='var(--gs-text)'; }}
          onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--gs-border)'; e.currentTarget.style.color=C.muted; }}
        >
          <Ico name={theme==='dark'?'sun':'moon'} size={14} color="currentColor"/>
        </button>
      </div>
    </header>
  );
}

/* ── KPI Card ───────────────────────────────── */
function KpiCard({ label, value, sub, accent, iconName, trend, trendLabel, barPct }) {
  const TrendArrow = trend==='up' ? '↑' : trend==='down' ? '↓' : '→';
  return (
    <div className="slide-up" style={{ position:'relative', flex:1, minWidth:160, background:'var(--gs-panel)', border:'1px solid var(--gs-border)', borderRadius:2, padding:'16px 18px', display:'flex', flexDirection:'column', gap:10, overflow:'hidden', boxShadow:'1px 1px 0 var(--gs-border)' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:1, background:accent, opacity:.7 }}/>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.22em', textTransform:'uppercase', color:C.muted }}>{label}</span>
        <Ico name={iconName} size={13} color={accent}/>
      </div>
      <div style={{ fontFamily:'var(--font-heading)', fontWeight:900, fontSize:26, color:'var(--gs-text)', lineHeight:1 }}>{value}</div>
      {barPct !== undefined && <div style={{ height:2, background:'var(--gs-border)', borderRadius:1 }}><div style={{ height:'100%', width:`${Math.min(barPct,100)}%`, background:accent, borderRadius:1, transition:'width 1s ease' }}/></div>}
      {trendLabel && <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:trend==='up'?C.green:trend==='down'?C.red:C.muted }}>{TrendArrow} {trendLabel}</span>
      </div>}
    </div>
  );
}

/* ── Terminal Feed ──────────────────────────── */
const LOG_SEED = [
  { type:'SYS', msg:'Conectado ao Supabase Realtime.' },
  { type:'INTEL', msg:'Carregando inferências de ML...' },
  { type:'OK', msg:'Pipeline DuckDB → Supabase: sincronizado.' },
  { type:'WARN', msg:'3 alertas ativos detectados.' },
  { type:'ADS', msg:'ADS_RADAR: 2 anúncios para desligar.' },
  { type:'SALE', msg:'Receita atualizada → R$ 84.930' },
  { type:'SYS', msg:'Aguardando novos eventos...' },
];
const TAG_COLOR = { SYS:'#666', INTEL:'#007aff', OK:'#007aff', WARN:'#ff9500', ADS:'#00adef', SALE:'#00ff66' };

function TerminalFeed({ lines }) {
  const ref = useRef(null);
  useEffect(() => { if(ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [lines]);
  return (

/* ── Sparkline (pure SVG) ───────────────────── */
function Sparkline({ data, color, height=100 }) {
  if(!data||data.length<2) return null;
  const w=400, h=height, pad=8;
  const min=Math.min(...data), max=Math.max(...data);
  const range=max-min||1;
  const pts = data.map((v,i)=>{
    const x = pad + (i/(data.length-1))*(w-2*pad);
    const y = h-pad-(((v-min)/range)*(h-2*pad));
    return [x,y];
  });
  const line = pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const area = line + ` L${pts[pts.length-1][0]},${h-pad} L${pts[0][0]},${h-pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width:'100%', height:'100%', overflow:'visible' }} preserveAspectRatio="none">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity={0.18}/>
          <stop offset="100%" stopColor={color} stopOpacity={0}/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#sg)"/>
      <path d={line} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

            <div style={{ border:'1px dashed var(--gs-border)', borderRadius:2, height:36, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', opacity:.4 }}
              onMouseEnter={e=>e.currentTarget.style.opacity='0.7'}
              onMouseLeave={e=>e.currentTarget.style.opacity='0.4'}
            >
              <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:C.muted }}>+ novo card</span>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── SETTINGS View ──────────────────────────── */
function Settings({ theme, onTheme }) {
  return (
    <div className="fade-in" style={{ maxWidth:560, display:'flex', flexDirection:'column', gap:16 }}>
      {[
        { section:'Aparência', items:[
          { label:'Tema', desc:'Alterna entre dark (padrão) e light (Mercado Livre)', control:<button onClick={onTheme} style={{ height:30, padding:'0 12px', borderRadius:2, border:'1px solid var(--gs-border)', background:'var(--gs-surface)', color:'var(--gs-text)', fontFamily:'var(--font-mono)', fontSize:10, cursor:'pointer', letterSpacing:'0.1em', textTransform:'uppercase' }}>{theme==='dark'?'☾ DARK':'☀ LIGHT'}</button> },
        ]},
        { section:'Sistema', items:[
          { label:'Versão', desc:'GS-QUAD INTEL OPS', control:<Badge color={C.muted} border="var(--gs-border)">v2.1.0</Badge> },
          { label:'Ambiente', desc:'Configuração de conexão Supabase', control:<Badge color={C.green}>PRODUÇÃO</Badge> },
          { label:'Realtime', desc:'WebSocket status', control:<span style={{ display:'flex', alignItems:'center', gap:5 }}><PulseDot size={6}/><span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:C.green }}>CONECTADO</span></span> },
        ]},
      ].map(group=>(
        <div key={group.section} style={{ background:'var(--gs-panel)', border:'1px solid var(--gs-border)', borderRadius:2, overflow:'hidden' }}>
          <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--gs-border)' }}>
            <span style={{ fontFamily:'var(--font-mono)', fontSize:9, color:C.muted, letterSpacing:'0.2em', textTransform:'uppercase', fontWeight:700 }}>{group.section}</span>
          </div>
          {group.items.map((item,i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 16px', borderBottom:i<group.items.length-1?'1px solid var(--gs-border)':'none' }}>
              <div>
                <div style={{ fontFamily:'var(--font-display)', fontSize:13, color:'var(--gs-text)', fontWeight:500 }}>{item.label}</div>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:9, color:C.muted, marginTop:3 }}>{item.desc}</div>
              </div>
              {item.control}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ── Placeholder view ───────────────────────── */
function PlaceholderView({ name }) {
  return (
    <div className="fade-in" style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'50vh', gap:12, opacity:.4 }}>
      <div style={{ width:48, height:48, border:'2px dashed var(--gs-border)', borderRadius:2, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Ico name="database" size={20} color={C.muted}/>
      </div>
      <div style={{ fontFamily:'var(--font-mono)', fontSize:10, color:C.muted, letterSpacing:'0.2em', textTransform:'uppercase' }}>[ {name} — stub view ]</div>
    </div>
  );
}

/* ── App Root ───────────────────────────────── */
function App() {
  const saved = localStorage.getItem('gs-active') || 'war_room';
  const savedTheme = localStorage.getItem('gs-theme') || 'dark';
  const [active, setActive] = useState(saved);
  const [theme, setTheme] = useState(savedTheme);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('gs-theme', theme);
  }, [theme]);

  const navigate = id => {
    setActive(id);
    localStorage.setItem('gs-active', id);
  };

  const toggleTheme = () => setTheme(t => t==='dark'?'light':'dark');

  const renderView = () => {
    switch(active) {
      case 'war_room': return <WarRoom/>;
      case 'terminal': return <TerminalDB/>;
      case 'monitor': return <Monitor/>;
      case 'ad_factory': return <AdFactory/>;
      case 'settings': return <Settings theme={theme} onTheme={toggleTheme}/>;
      default: return <PlaceholderView name={active.toUpperCase()}/>;
    }
  };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', background:'var(--gs-deep)', color:'var(--gs-text)' }}>
      <Sidebar active={active} onNav={navigate}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <Topbar active={active} theme={theme} onTheme={toggleTheme}/>
        <main style={{ flex:1, overflowY:'auto', overflowX:'hidden' }}>
          <div style={{ maxWidth:1680, margin:'0 auto', padding:'32px 32px' }}>
            {renderView()}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
